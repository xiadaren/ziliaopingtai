user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # 基础性能优化
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests   100;
    types_hash_max_size 4096;
    sendfile_max_chunk  512k;

    # 安全配置
    server_tokens off;
    client_max_body_size 10M;

    # 请求频率限制
    limit_req_zone $binary_remote_addr zone=one:10m rate=10r/s;

    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1k;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        image/svg+xml
        font/woff
        font/woff2
        font/ttf
        font/eot;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    # HTTP自动跳转到HTTPS
    server {
        listen       80;
        listen       [::]:80;
        server_name  luobichengwen.top www.luobichengwen.top;
        return 301 https://$host$request_uri;
    }

    # HTTPS配置
    server {
        listen       443 ssl http2;
        listen       [::]:443 ssl http2;
        server_name  luobichengwen.top www.luobichengwen.top;

        # 替换成你的证书路径
        ssl_certificate /etc/nginx/ssl/luobichengwen.top_bundle.pem;
        ssl_certificate_key /etc/nginx/ssl/luobichengwen.top.key;

        # SSL安全配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;
        ssl_prefer_server_ciphers on;

        # 禁止访问敏感文件
        location ~ /\. {
            deny all;
        }
        location ~* \.(json|md|log|conf|sql)$ {
            deny all;
        }

        # 静态资源直接由Nginx处理
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            root /opt/ziliaopingtai/public;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin *;
        }

        # 上传文件目录
        location /uploads/ {
            alias /opt/ziliaopingtai/uploads/;
            expires 7d;
            add_header Cache-Control "public";
            
            # 禁止执行恶意脚本
            location ~* \.(php|jsp|asp|sh|py)$ {
                deny all;
            }
        }

        # 动态请求转发给Node.js
        location / {
            limit_req zone=one burst=20 nodelay;
            
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        error_page 404 /404.html;
        location = /404.html {
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
        }
    }
}